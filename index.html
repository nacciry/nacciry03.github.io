<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>倪诗睿 | 个人作品集</title>

  <style>
    body {
      margin: 0;
      font-family: "Courier New", monospace;
      background-color: #cfe8d5;
    }

    /* 像素风导航栏 */
    nav {
      background-color: #3a5f4d;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      border-bottom: 4px solid #2b4436;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }

    /* 第一屏 */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 60px;
    }

    .hero-text {
      max-width: 50%;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 16px;
      line-height: 1.8;
    }

    /* 像素卡片风 */
    .card {
      background: #ffffff;
      padding: 20px;
      margin: 40px 60px;
      border: 4px solid #2b4436;
      box-shadow: 6px 6px 0 #2b4436;
    }

    /* 图片 */
    .hero img {
      width: 260px;
      image-rendering: pixelated;
      border: 4px solid #2b4436;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>

<body>

  <!-- 导航栏 -->
  <nav>
    <div><strong>倪诗睿</strong></div>
    <div>
      <a href="#">首页</a>
      <a href="#">关于我</a>
      <a href="#">项目</a>
      <a href="#">联系</a>
    </div>
  </nav>

  <!-- 第一屏 -->
  <section class="hero">
    <div class="hero-text">
      <h1>你好，我是倪诗睿 👋</h1>

      <p>山东大学商学院｜工商管理（数字营销方向）</p>

      <p>
        具备市场营销与数据分析复合背景，
        熟悉消费者行为与品牌管理，
        同时掌握Python、SQL等数据分析工具。
      </p>
    </div>

    <!-- 你的照片 -->
    <img src="photo.jpg" alt="个人照片">
  </section>

  <!-- About Me -->
  <div class="card">
    <h2>关于我</h2>

    <p>
      GPA 83.38，专业排名前30%，具备良好的学术基础与学习能力。
    </p>

    <p>
      在数据分析方面，能够运用统计方法与技术工具，
      将数据分析应用于营销与用户研究场景。
    </p>

    <h3>荣誉奖项</h3>
    <ul>
      <li>山东大学优秀毕业生（2026届）</li>
      <li>山东大学学业奖学金</li>
    </ul>
  </div>

</body>
</html>
